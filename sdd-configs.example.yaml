# SDD Agent Model Configuration Example
# Copy this file to sdd-configs.yaml and customize for your needs
#
# This file configures which AI models are used for each SDD phase.
# See AGENTS.md for details on the SDD workflow.
#
# Usage:
#   ./configure-sdd.sh              # Interactive mode (select profile)
#   ./configure-sdd.sh --list       # List available profiles
#   ./configure-sdd.sh --config NAME # Apply profile NAME
#
# Supported settings per agent (when using object format):
#   model       - Model identifier (required in object format)
#   temperature - Sampling temperature (0.0-2.0)
#   top_p       - Nucleus sampling threshold (0.0-1.0)
#   steps       - Max agent iterations before text-only response
#   maxSteps    - Deprecated, use steps
#   mode        - "subagent" | "primary" | "all"
#   variant     - Model variant (e.g., "thinking")
#   prompt      - Custom system prompt
#   color       - Hex color (#RRGGBB) or theme color (primary, secondary, etc.)
#   disable     - Set to true to disable this agent
#   hidden      - Hide from @ autocomplete
#   options     - Additional provider options (object with arbitrary keys/values)

configs:
  # Cloud-based models (default)
  # Best for most users with internet connectivity
  - name: "cloud"
    active: true
    models:
      plan: "opencode-go/minimax-m2.5"
      build: "opencode-go/kimi-k2.5"
      explore: "opencode-go/glm-5"
      general: "opencode-go/glm-5"

  # Local models with custom settings
  # For users running models locally via Ollama, LM Studio, etc.
  - name: "local"
    active: false
    models:
      plan:
        model: "local/nemotron3-nano"
        temperature: 0.2
        top_p: 0.9
        steps: 3
        mode: "primary"
      build:
        model: "local/devstral-small-2"
        temperature: 0.2
        top_p: 0.9
        steps: 3
        mode: "primary"
      explore: "local/nanbeige4.1"
      general: "local/nemotron3-nano"

